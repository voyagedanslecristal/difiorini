function useReveal(count, delay = 80) {
  const [visible, setVisible] = useState([]);
  useEffect(() => { setVisible([]); const t = Array.from({ length: count }, (_, i) => setTimeout(() => setVisible(v => [...v, i]), 200 + i * delay)); return () => t.forEach(clearTimeout); }, [count, delay]);
  return visible;
}

function Transition({ children, page }) {
  const [show, setShow] = useState(false);
  useEffect(() => { setShow(false); const t = setTimeout(() => setShow(true), 50); return () => clearTimeout(t); }, [page]);
  return <div style={{ opacity: show ? 1 : 0, transform: show ? "none" : "translateY(18px)", transition: "opacity 0.7s cubic-bezier(.22,.68,0,1), transform 0.7s cubic-bezier(.22,.68,0,1)" }}>{children}</div>;
}

  <script>
  (function(){
    function lerp(a, b, t) { return Math.round(a + (b - a) * t); }
    function lerpColor(c1, c2, t) {
      return 'rgb('+lerp(c1[0],c2[0],t)+','+lerp(c1[1],c2[1],t)+','+lerp(c1[2],c2[2],t)+')';
    }
    function lerpColorA(c1, c2, a1, a2, t) {
      return 'rgba('+lerp(c1[0],c2[0],t)+','+lerp(c1[1],c2[1],t)+','+lerp(c1[2],c2[2],t)+','+(a1+(a2-a1)*t).toFixed(2)+')';
    }

    // Night → Day
    const BG_NIGHT   = [4, 12, 26];
    const BG_DAY     = [237, 229, 216];
    const CARD_NIGHT = [8, 18, 40];
    const CARD_DAY   = [250, 248, 245];
    const TXT_NIGHT  = [200, 190, 170];
    const TXT_DAY    = [44, 38, 34];
    const NAV_NIGHT  = [4, 12, 26];
    const NAV_DAY    = [237, 229, 216];

    function applyTheme(t) {
      if (document.getElementById('paper-bg')) return; // Writing page — skip
      // ease
      const e = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;

      document.body.style.background = lerpColor(BG_NIGHT, BG_DAY, e);

      const nav = document.querySelector('nav');
      if (nav) nav.style.removeProperty('background');

      // Nav buttons seulement
      document.querySelectorAll('nav button, nav span').forEach(el => {
        el.style.color = lerpColor([210,200,180], [44,38,34], e);
      });

      // bg image opacity — plus visible la nuit
      const bgStyle = document.querySelector('style[id="bg-style"]');
      // handled via pseudo-element opacity in stylesheet

      // Curseur — bleu la nuit, bleu nuit le jour
      const cp = document.getElementById('cp');
      if (cp) cp.setAttribute('stroke', lerpColor([80,120,220],[0,43,127],e));

      // Zone jour — apparaît à partir de 40% du scroll
      const dayZone = document.getElementById('day-zone');
      if (dayZone) dayZone.style.opacity = Math.max(0, (e - 0.4) / 0.6).toFixed(2);

      // Toutes les cartes — couleur texte seulement, pas le fond
      document.querySelectorAll('.content-card').forEach(card => {
        card.style.removeProperty('background');
        card.style.removeProperty('box-shadow');
      });
    }

    let ticking = false;
    window.addEventListener('scroll', function() {
      if (!ticking) {
        requestAnimationFrame(function() {
          const maxScroll = document.body.scrollHeight - window.innerHeight;
          const t = maxScroll > 0 ? Math.min(window.scrollY / maxScroll, 1) : 0;
          applyTheme(t);
          ticking = false;
        });
        ticking = true;
      }
    }, {passive:true});

    // Init — nuit
    applyTheme(0);
  })();
  </script>

      if (!night || !day) { setTimeout(init, 100); return; }
      night.style.setProperty('background','rgba(7,12,26,0.82)','important');
      day.style.setProperty('background','rgba(250,248,245,0.95)','important');
      document.getElementById('root').children[0].style.background = 'transparent';
      const tw = document.getElementById('root')?.children[0]?.children[0];
      if (tw) tw.style.setProperty('opacity','1','important');
    }
    if (document.readyState === 'complete') { setTimeout(init, 300); }
    else { window.addEventListener('load', function(){ setTimeout(init, 300); }); }
  })();
  </script>
</body>
</html>
